on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]  

jobs:
  build:
    runs-on: ubuntu-latest  

    steps:  
    - name: Check out repository
      uses: actions/checkout@v2 
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: 3.8 
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r req.txt
    - name: Run app.py
      run: |
        python app.py
  containerize:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Check out repository
      uses: actions/checkout@v2 
    - name: Build Docker image
      run: |
        docker build -t abc .  